<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#071b2d" />
      <stop offset="100%" stop-color="#0b1021" />
    </linearGradient>

    <!-- Glowing Accent Gradients -->
    <linearGradient id="bio-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <linearGradient id="ai-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0844" />
      <stop offset="100%" stop-color="#ffb199" />
    </linearGradient>

    <linearGradient id="glow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38ef7d" />
      <stop offset="100%" stop-color="#11998e" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>

    <!-- Drop Shadows and Glows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* CSS Animations for Dynamic Aspect */
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.15); opacity: 0.8; }
    }

    @keyframes drift {
      0% { transform: translate(0, 0); }
      50% { transform: translate(10px, -15px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes dna-rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(0, 242, 254, 0.4)); }
      50% { filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.8)); }
    }

    @keyframes pulse-ai-glow {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(255, 8, 68, 0.4)); }
      50% { filter: drop-shadow(0 0 15px rgba(255, 8, 68, 0.8)); }
    }

    @keyframes wave {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -100; }
    }

    .bg-grid {
      fill: url(#grid);
    }

    .glow-node {
      animation: pulse 4s ease-in-out infinite;
    }

    .glow-node-delayed {
      animation: pulse 4s ease-in-out infinite;
      animation-delay: 2s;
    }

    .drifting-bg {
      animation: drift 12s ease-in-out infinite;
    }

    .bio-connection {
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .ai-connection {
      animation: pulse-ai-glow 3s ease-in-out infinite;
      animation-delay: 1.5s;
    }

    .animated-link {
      stroke-dasharray: 10 5;
      animation: wave 10s linear infinite;
    }

    .title-text {
      font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 46px;
      fill: #ffffff;
      letter-spacing: -1px;
    }

    .subtitle-text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 500;
      font-size: 18px;
      fill: #a0aec0;
      letter-spacing: 1px;
    }

    .tag {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 700;
      font-size: 12px;
      fill: #00f2fe;
      letter-spacing: 2px;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Abstract Bio-AI Decorative Elements (Left Side) -->
  <g class="drifting-bg" opacity="0.6">
    <!-- Blurry glowing blobs behind -->
    <circle cx="200" cy="150" r="120" fill="url(#bio-gradient)" opacity="0.15" filter="url(#glow)" />
    <circle cx="1000" cy="250" r="150" fill="url(#ai-gradient)" opacity="0.1" filter="url(#glow)" />
  </g>

  <!-- Glowing Bio-Network Illustration (Left Side) -->
  <g transform="translate(120, 80)">
    <!-- DNA-like spiral or abstract biotech lattice -->
    <path class="bio-connection" d="M 30,60 Q 60,30 90,60 T 150,60 T 210,60 T 270,60" fill="none" stroke="url(#bio-gradient)" stroke-width="4" filter="url(#subtle-glow)" />
    <path class="bio-connection" d="M 30,60 Q 60,90 90,60 T 150,60 T 210,60 T 270,60" fill="none" stroke="url(#bio-gradient)" stroke-width="4" filter="url(#subtle-glow)" style="animation-delay: 1.5s;" />
    
    <!-- Connectors -->
    <line x1="90" y1="38" x2="90" y2="82" stroke="rgba(0, 242, 254, 0.4)" stroke-width="2" />
    <line x1="150" y1="38" x2="150" y2="82" stroke="rgba(0, 242, 254, 0.4)" stroke-width="2" />
    <line x1="210" y1="38" x2="210" y2="82" stroke="rgba(0, 242, 254, 0.4)" stroke-width="2" />

    <!-- Nodes -->
    <circle cx="90" cy="38" r="6" fill="#00f2fe" class="glow-node" />
    <circle cx="90" cy="82" r="6" fill="#00f2fe" class="glow-node-delayed" />
    <circle cx="150" cy="38" r="6" fill="#00f2fe" class="glow-node-delayed" />
    <circle cx="150" cy="82" r="6" fill="#00f2fe" class="glow-node" />
    <circle cx="210" cy="38" r="6" fill="#00f2fe" class="glow-node" />
    <circle cx="210" cy="82" r="6" fill="#00f2fe" class="glow-node-delayed" />
  </g>

  <!-- Glowing Neural Network AI Illustration (Right Side) -->
  <g transform="translate(850, 70)">
    <!-- Connections -->
    <line x1="100" y1="50" x2="180" y2="100" stroke="url(#ai-gradient)" stroke-width="2" class="animated-link" />
    <line x1="100" y1="150" x2="180" y2="100" stroke="url(#ai-gradient)" stroke-width="2" class="animated-link" />
    <line x1="180" y1="100" x2="260" y2="50" stroke="url(#ai-gradient)" stroke-width="2" />
    <line x1="180" y1="100" x2="260" y2="150" stroke="url(#ai-gradient)" stroke-width="2" />
    <line x1="100" y1="50" x2="100" y2="150" stroke="rgba(255, 8, 68, 0.2)" stroke-width="1.5" />
    <line x1="260" y1="50" x2="260" y2="150" stroke="rgba(255, 8, 68, 0.2)" stroke-width="1.5" />

    <!-- Nodes -->
    <circle cx="100" cy="50" r="8" fill="#ff0844" class="glow-node" filter="url(#subtle-glow)" />
    <circle cx="100" cy="150" r="8" fill="#ff0844" class="glow-node-delayed" filter="url(#subtle-glow)" />
    <circle cx="180" cy="100" r="12" fill="#ffb199" class="glow-node" filter="url(#subtle-glow)" />
    <circle cx="260" cy="50" r="8" fill="#ff0844" class="glow-node-delayed" filter="url(#subtle-glow)" />
    <circle cx="260" cy="150" r="8" fill="#ff0844" class="glow-node" filter="url(#subtle-glow)" />
  </g>

  <!-- Central Typography / Brand -->
  <g transform="translate(600, 200)" text-anchor="middle">
    <!-- Decorative pill badge -->
    <rect x="-110" y="-120" width="220" height="32" rx="16" fill="rgba(0, 242, 254, 0.08)" stroke="rgba(0, 242, 254, 0.3)" stroke-width="1" />
    <text class="tag" y="-100">BIOLOGY 🧬 MEET AI</text>

    <!-- Main Title -->
    <text class="title-text" y="-30">Awesome BioAI PM</text>
    <text class="title-text" y="25" fill="url(#bio-gradient)">Interview Q&amp;A</text>

    <!-- Subtitle / Info -->
    <text class="subtitle-text" y="85">185+ curated questions &amp; answers for shipping AI in life sciences</text>
    
    <!-- Badges / Stats -->
    <g transform="translate(0, 130)">
      <!-- Badge 1: 185+ Q&A -->
      <g transform="translate(-140, 0)">
        <rect x="-70" y="-18" width="140" height="30" rx="6" fill="#1a202c" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
        <text font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" font-weight="bold" text-anchor="middle" y="1">📚 185+ Questions</text>
      </g>
      <!-- Badge 2: Drug Discovery -->
      <g transform="translate(0, 0)">
        <rect x="-80" y="-18" width="160" height="30" rx="6" fill="#1a202c" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
        <text font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" font-weight="bold" text-anchor="middle" y="1">🧬 Drug Discovery</text>
      </g>
      <!-- Badge 3: Clinical AI -->
      <g transform="translate(140, 0)">
        <rect x="-70" y="-18" width="140" height="30" rx="6" fill="#1a202c" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
        <text font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" font-weight="bold" text-anchor="middle" y="1">🏥 Clinical AI</text>
      </g>
    </g>
  </g>
</svg>
